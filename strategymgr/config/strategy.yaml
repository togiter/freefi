strategies:
  - name: ETH-USDT
    combine: 1  #指示如何组合节点决策， G1 || G2, G1 && G2
    status: 0 #0 正常， 1 禁用
    ignoreOpposition: false #是否忽略对立(比如节点决策1:1相反决策)
    passRate: 0.5
    dataSource: 
      exchange: "BINANCE"
      symbol: "ETH-USDT"
      market: "SPOT"
      limit: 150
      ticker: 3000 #k线查询周期 s
    groupStrategies:
      15:
        name: "bband&macd&stochrsi"
        status: 0 #状态，0 启用，1，禁用
        type: 0 # 类型，0-不区分,1-控盘线，2-决策线
        ignoreOpposition: false #是否忽略对立(比如节点决策1:1相反决策)
        passRate: 0.5 # 通过率，如果叶子决策满足(n/m >= passRate)，则该决策应该优先。
        required: false # true/false是否必选,如果该指标不满足，该组其他指标也无法通过。
        closeRate: 0.5 #平仓率，如果叶子决策满足(n/m),可作为平仓策略(不满足开仓的情况)
        isDictatorship: false # 是否有独断/裁能力，如果该指标通过，其他指标通不通过不重要。
        fomoLevel: 0 #交易等级
        delays: #延时策略，如果组内指标talib满足延时(X倍K线时间)策略，一般作为止盈止损平仓指标。
          macd: 2
        microStrategies: #叶子策略
          macd:
            name: "macd"
            required: false # true/false是否必选,如果该指标不满足，该组其他指标也无法通过。
            isDictatorship: false # 是否有独断/裁能力，如果该指标通过，其他指标通不通过不重要。
            legacy: false #是否使用经典决策(未经优化)。如果为否，则默认使用优化后的指标。
            params:
              fastPeriod: 10
              slowPeriod: 22
              signalPeriod: 7
              continueSize: 10 #持续未交叉K线时段
              continueFomo: 3 #交叉后N个K线内
          bbands:
            name: "bbands"
            required: false
            isDictatorship: false
            legacy: false
            params:
              inTimePeriod: 20
              deviation: 2
              kLineNum: 7
              maType: 0 
          stochrsi:
            name: "stochrsi"
            required: false
            isDictatorship: false
            legacy: false
            params:
              rsiPeriod: 14
              stochRsiPeriod: 14
              smoothKPeriod: 3
              smoothDPeriod: 3
              overBuyVal: 85 #超买阈值
              overSellVal: 20 #超卖阈值
      60:
        name: "bband&stochrsi111"
        status: 0 #状态，0 启用，1，禁用
        type: 0 # 类型，0-不区分,1-控盘线，2-决策线
